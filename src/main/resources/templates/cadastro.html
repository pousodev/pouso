<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Pouso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-primary: #6750A4;
            --md-on-primary: #FFFFFF;
            --md-primary-container: #EADDFF;
            --md-surface: #FEF7FF;
            --md-surface-container-highest: #E6E0E9;
            --md-outline-variant: #CAC4D0;
            --md-on-surface: #1D1B20;
            --md-on-surface-variant: #49454F;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--md-surface);
            color: var(--md-on-surface);
        }

        .app-header {
            height: 88px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .menu-icon {
            font-size: 30px;
            color: var(--md-on-surface-variant);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;

            color: #3C2300;
            font-family: "EB Garamond", serif;
            font-size: 36.655px;
            font-style: normal;
            font-weight: 600;
            line-height: normal;
        }

        .logo img {
            width: 46px;
            height: 46px;
            object-fit: contain;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 28px;
            font-size: 18px;
            font-weight: bold;
        }

        .header-actions a {
            text-decoration: none;
            color: #000000;
        }

        .btn-login {
            height: 48px;
            padding: 0 24px;
            border-radius: 24px;
            background: var(--md-primary);
            color: var(--md-on-primary) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .page {
            min-height: calc(100vh - 88px);
            background: #FFF7FF;
            padding: 42px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .card {
            width: 905px;
            min-height: 680px;
            background: #FFFFFF;
            border-radius: 18px;
            padding: 34px 42px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 42px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 22px;
            font-size: 32px;
            font-weight: 400;
        }

        .card-title img {
            width: 32px;
            height: 32px;
        }

        .close {
            font-size: 42px;
            color: var(--md-on-surface-variant);
        }

        .form-area {
            width: 739px;
            margin: 0 auto;
            padding: 28px 25px;
            display: grid;
            grid-template-columns: 212px 212px;
            column-gap: 58px;
            row-gap: 22px;
            justify-content: center;
            align-items: start;
        }

        .text-field {
            width: 212px;
            height: 56px;
            background: var(--md-surface-container-highest);
            border-radius: 4px 4px 0 0;
            border-bottom: 1px solid var(--md-on-surface-variant);
            position: relative;
            padding: 8px 42px 6px 16px;
        }

        .text-field label {
            display: block;
            font-size: 14px;
            color: var(--md-on-surface-variant);
            margin-bottom: 4px;
        }

        .text-field input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 17px;
            color: var(--md-on-surface);
        }

        .text-field input::placeholder {
            color: var(--md-on-surface-variant);
            opacity: 1;
        }

        .clear-icon {
            position: absolute;
            right: 12px;
            top: 16px;

            width: 24px;
            height: 24px;

            object-fit: contain;
        }

        .gender-box {
            width: 212px;
            grid-row: span 3;
            padding-top: 16px;
            border-top: 1px solid var(--md-outline-variant);
        }

        .gender-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--md-on-surface-variant);
            margin-bottom: 20px;
        }

        .gender-option {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 28px;
            font-size: 22px;
        }

        .gender-option input {
            width: 24px;
            height: 24px;
            accent-color: var(--md-primary);
        }

        .btn-next {
            grid-column: 2;
            justify-self: end;
            width: 99px;
            height: 48px;
            border: none;
            border-radius: 24px;
            background: var(--md-primary);
            color: var(--md-on-primary);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .message {
            grid-column: 1 / 3;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }

        .success {
            color: #1B7F3A;
        }

        .error {
            color: #B3261E;
        }
    </style>
</head>

<body>

<header class="app-header">
    <div class="header-left">
        <span class="menu-icon">☰</span>

        <div class="logo">
            <img src="/img/logo.png" alt="Logo Pouso">
            <span>Pouso</span>
        </div>
    </div>

    <nav class="header-actions">
        <a class="btn-login" href="/login">
            <img src="/icons/login.svg" alt="Entrar">
            <span>Entrar</span>
        </a>
        <a href="/cadastro">Cadastrar</a>
    </nav>
</header>

<main class="page">
    <section class="card">
        <div class="card-header">
            <div class="card-title">
                <img src="/icons/account_circle.svg" alt="Cadastro">
                <span>Cadastro</span>
            </div>

            <div class="close">×</div>
        </div>

        <form class="form-area" action="/cadastro" method="post">
            <div class="text-field">
                <label>Nome</label>
                <input name="nome" placeholder="Nome completo" required>
            </div>

            <div class="text-field">
                <label>CPF</label>
                <input name="cpf" maxlength="11" placeholder="xxx.xxx.xxx-xx" required>
                <img class="clear-icon" src="/icons/field-icon.svg" alt="">
            </div>

            <div class="text-field">
                <label>Username</label>
                <input name="username" placeholder="Nome de usuário" required>
                <img class="clear-icon" src="/icons/field-icon.svg" alt="">
            </div>

            <div class="text-field">
                <label>Telefone</label>
                <input name="telefone" maxlength="11" placeholder="xx xxxxx xxxx" required>
                <img class="clear-icon" src="/icons/field-icon.svg" alt="">
            </div>

            <div class="text-field">
                <label>Email</label>
                <input name="email" type="email" placeholder="email@email" required>
                <img class="clear-icon" src="/icons/field-icon.svg" alt="">
            </div>

            <div class="gender-box">
                <div class="gender-title">Gênero</div>

                <label class="gender-option">
                    <input type="radio" name="genero" value="M" checked>
                    Masculino
                </label>

                <label class="gender-option">
                    <input type="radio" name="genero" value="F">
                    Feminino
                </label>

                <label class="gender-option">
                    <input type="radio" name="genero" value="O">
                    Outro
                </label>
            </div>

            <div class="text-field">
                <label>Senha</label>
                <input name="password" type="password" placeholder="*****" required>
                <img class="clear-icon" src="/icons/field-icon.svg" alt="">
            </div>

            <button class="btn-next" type="submit">Próximo</button>

            <div class="message success" th:if="${success}" th:text="${success}"></div>
            <div class="message error" th:if="${error}" th:text="${error}"></div>
        </form>
    </section>
</main>

</body>
</html>
